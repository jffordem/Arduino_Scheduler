[platformio]
default_envs = dev

[env]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.mcu = esp32s3
board_build.flash_size = 16MB
board_build.flash_mode = qio
board_build.filesystem = littlefs
monitor_speed = 115200
lib_deps =
    mathieucarbou/AsyncTCP
    mathieucarbou/ESPAsyncWebServer
    bblanchon/ArduinoJson @ ^7

; Development: Serial on UART0 (COM port from USB-to-UART chip), HID disabled.
; Flash: pio run -e dev
; Filesystem: pio run -e dev -t uploadfs
[env:dev]
build_flags =
    -DARDUINO_USB_MODE=1

; Deployment: TinyUSB HID active, Serial on UART0 pins (IO43/IO44).
; Flash: hold BOOT, tap RESET, release BOOT, then: pio run -e hid
; Filesystem: same BOOT/RESET dance, then: pio run -e hid -t uploadfs
[env:hid]
build_flags =
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DUSB_HID_MODE
