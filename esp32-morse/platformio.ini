[platformio]
default_envs = dev

[env]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.mcu = esp32s3
board_build.flash_size = 16MB
board_build.flash_mode = qio
board_build.filesystem = littlefs
monitor_speed = 115200
lib_deps =
    mathieucarbou/AsyncTCP
    mathieucarbou/ESPAsyncWebServer
    bblanchon/ArduinoJson @ ^7
    adafruit/Adafruit NeoPixel @ ^1

; Development: Serial on UART0 (CH343 bridge, COM5). NeoPixel not driven.
; Flash: pio run -e dev -t upload
; Filesystem: pio run -e dev -t uploadfs
[env:dev]
monitor_port = COM5
build_flags =
    -DARDUINO_USB_MODE=1

; Deployment: NeoPixel active (MORSE_ACTIVE), Serial on UART0.
; Flash: flash.bat  or  flash.bat all  (code + filesystem)
[env:morse]
monitor_port = COM5
upload_port = COM5
upload_protocol = esptool
upload_speed = 921600
build_flags =
    -DARDUINO_USB_MODE=1
    -DMORSE_ACTIVE
