<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Interactive Fiction Library</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #0a0a0a;
      color: #33ff33;
      font: 15px/1.5 'Courier New', Courier, monospace;
    }
    body { display: flex; flex-direction: column; }

    /* ── Selector screen ── */
    #selector {
      flex: 1;
      padding: 2rem;
      overflow-y: auto;
    }
    #selector h1 {
      margin: 0 0 0.3rem;
      font-size: 1.1rem;
      letter-spacing: 0.15em;
      border-bottom: 1px solid #1a3a1a;
      padding-bottom: 0.5rem;
    }
    #selector-status {
      margin: 0.75rem 0 1rem;
      color: #1a7a1a;
      font-size: 0.85rem;
    }
    #game-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    #game-list li {
      padding: 0.5rem 0.75rem;
      cursor: pointer;
      border: 1px solid #1a3a1a;
      margin-bottom: 0.4rem;
    }
    #game-list li:hover, #game-list li:focus {
      background: #0f2d0f;
      outline: none;
      border-color: #33ff33;
    }
    .game-name { font-size: 1rem; }
    .game-file { font-size: 0.75rem; color: #1a7a1a; margin-top: 0.1rem; }

    /* ── Terminal screen ── */
    #terminal {
      display: none;
    }
    #terminal.active {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      background: #0a0a0a;
    }

    #top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.2rem 0.6rem;
      background: #0a0a0a;
      border-bottom: 1px solid #1a3a1a;
      font-size: 0.7rem;
      flex-shrink: 0;
    }
    #ws-status { color: #1a4d1a; }
    #ws-status.connected { color: #1a7a1a; }
    #ws-status.error     { color: #7a1a1a; }
    #back-btn {
      background: none;
      border: 1px solid #1a3a1a;
      color: #1a6d1a;
      font: inherit;
      font-size: 0.7rem;
      cursor: pointer;
      padding: 0.1rem 0.5rem;
    }
    #back-btn:hover { color: #33ff33; border-color: #33ff33; }

    #output {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 1rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #input-row {
      display: flex;
      align-items: center;
      border-top: 1px solid #1a3a1a;
      background: #0f0f0f;
      padding: 0.4rem 0.75rem;
      gap: 0.5rem;
      flex-shrink: 0;
    }
    #prompt { color: #33ff33; user-select: none; }
    #input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #33ff33;
      font: inherit;
      caret-color: #33ff33;
      min-height: 2.2rem;
      padding: 0.3rem 0;
    }
  </style>
</head>
<body>

  <!-- Game selector screen -->
  <div id="selector">
    <h1>INTERACTIVE FICTION LIBRARY</h1>
    <p id="selector-status">Loading games...</p>
    <ul id="game-list"></ul>
  </div>

  <!-- Terminal screen -->
  <div id="terminal">
    <div id="top-bar">
      <span id="ws-status">Connecting…</span>
      <button id="back-btn" onclick="goBack()">&#9664; MENU</button>
    </div>
    <div id="output"></div>
    <div id="input-row">
      <span id="prompt">&gt;</span>
      <input id="input" type="text"
             autocomplete="off" autocorrect="off"
             autocapitalize="none" spellcheck="false">
    </div>
  </div>

  <script>
    const selScreen  = document.getElementById('selector');
    const termScreen = document.getElementById('terminal');
    const gameList   = document.getElementById('game-list');
    const selStatus  = document.getElementById('selector-status');
    const output     = document.getElementById('output');
    const input      = document.getElementById('input');
    const wsStatus   = document.getElementById('ws-status');
    let ws = null;

    /* Turn "zork1.z3" into "Zork 1", "hitchhiker.z5" into "Hitchhiker", etc. */
    function gameTitle(filename) {
      return filename
        .replace(/\.[^.]+$/, '')
        .replace(/[-_]/g, ' ')
        .replace(/([a-zA-Z])(\d)/g, '$1 $2')
        .replace(/\b\w/g, c => c.toUpperCase())
        .trim();
    }

    async function loadGames() {
      try {
        const res  = await fetch('/api/games');
        const list = await res.json();
        gameList.innerHTML = '';
        if (list.length === 0) {
          selStatus.textContent =
            'No story files found. Copy .z3/.z5/.z8 files to data/ and run: flash.bat fs';
          return;
        }
        list.sort();
        selStatus.textContent = 'Choose a game:';
        list.forEach(filename => {
          const li = document.createElement('li');
          li.tabIndex = 0;
          li.innerHTML =
            '<div class="game-name">' + gameTitle(filename) + '</div>' +
            '<div class="game-file">' + filename + '</div>';
          li.addEventListener('click',   () => startGame(filename));
          li.addEventListener('keydown', e => { if (e.key === 'Enter') startGame(filename); });
          gameList.appendChild(li);
        });
      } catch (e) {
        selStatus.textContent = 'Failed to load games list.';
      }
    }

    function scrollToBottom() {
      output.scrollTop = output.scrollHeight;
    }

    function print(text) {
      output.insertAdjacentText('beforeend', text);
      output.scrollTop = output.scrollHeight;
    }

    function startGame(filename) {
      selScreen.style.display  = 'none';
      termScreen.classList.add('active');
      output.replaceChildren();
      input.disabled           = false;
      wsStatus.textContent     = 'Connecting…';
      wsStatus.className       = '';

      ws = new WebSocket('ws://' + location.host + '/ws');

      ws.onopen = () => {
        wsStatus.textContent = gameTitle(filename);
        wsStatus.className   = 'connected';
        ws.send(filename);   /* First message selects the game on the server */
        input.focus();
      };
      ws.onmessage = (e) => print(e.data);
      ws.onclose = () => {
        wsStatus.textContent = 'Disconnected';
        wsStatus.className   = 'error';
        input.disabled       = true;
      };
      ws.onerror = () => {
        wsStatus.textContent = 'Error';
        wsStatus.className   = 'error';
      };
    }

    function goBack() {
      if (ws) {
        ws.onclose = null;  /* suppress disconnect handler */
        ws.close();
        ws = null;
      }
      termScreen.classList.remove('active');
      selScreen.style.display = '';
    }

    input.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      const line = input.value.trim();
      if (!line) return;
      print(line + '\n');
      if (ws && ws.readyState === WebSocket.OPEN) ws.send(line);
      input.value = '';
      requestAnimationFrame(scrollToBottom);
    });

    /* Keep input focused when tapping the terminal area. */
    document.addEventListener('click', () => {
      if (termScreen.classList.contains('active')) input.focus();
    });

    loadGames();
  </script>
</body>
</html>
